<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat | Relief Ops</title>
  <link rel="stylesheet" href="/css/chat.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">🛡</div>
      <h2>RELIEF OPS</h2>
    </div>

    <div class="role-label">CAMP MANAGER — SECTOR 7G</div>

    <nav class="side-nav">
      <a href="camp-dashboard.html">▦ Dashboard</a>
      <a href="families.html">👥 Families</a>
      <a href="stock.html">📦 Stock</a>
      <a href="volunteers.html">👥 Volunteers</a>
      <a href="distribution.html">▤ Distribution</a>
      <a href="chat.html" class="active">□ Chat</a>
    </nav>

    <a href="login.html" class="signout">↪ Sign Out</a>
  </aside>

  <main class="chat-main">
    <header class="chat-header">
      <div>
        <h1>Chat</h1>
        <p>Communicate with volunteers and admin</p>
      </div>
    </header>

    <section class="channel-header">
      <h2>▱ General Channel</h2>
      <span id="participantCount">
        <!-- Dynamic participant count will be loaded here -->
      </span>
    </section>

    <section class="messages" id="messageList">
      <!-- Dynamic chat messages will be loaded here from database -->
    </section>

    <form class="message-form">
      <input type="text" name="message" placeholder="Type a message..." />
      <button type="submit">➤</button>
    </form>
  </main>
</body>
</html>
