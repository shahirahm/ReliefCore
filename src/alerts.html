<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alerts & Announcements | Relief Ops</title>
  <link rel="stylesheet" href="/css/alerts.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">🛡</div>
      <h2>RELIEF OPS</h2>
    </div>

    <div class="role-label">ADMINISTRATOR</div>

    <nav class="side-nav">
      <a href="admin-dashboard.html">▦ Dashboard</a>
      <a href="camp-managers.html">👥 Camp Managers</a>
      <a href="camp-locations.html">📍 Camps</a>
      <a href="supply-monitor.html">📦 Supply Monitor</a>
      <a href="alerts.html" class="active">⚠ Alerts</a>
      <a href="reports.html">▤ Reports</a>
      <a href="chat.html">□ Chat</a>
    </nav>

    <a href="login.html" class="signout">↪ Sign Out</a>
  </aside>

  <main class="main-content">
    <header class="page-header">
      <h1>Alerts & Announcements</h1>
      <p>Send urgent alerts and view recent announcements</p>
    </header>

    <section class="alerts-layout">
      <form class="alert-form">
        <div class="form-icon">🔔</div>

        <input type="text" name="alertTitle" placeholder="Alert Title" required />

        <textarea name="alertMessage" placeholder="Alert Message" required></textarea>

        <select name="severity" required>
          <option value="">Severity</option>
          <option value="critical">Critical</option>
          <option value="warning">Warning</option>
          <option value="info">Info</option>
        </select>

        <select name="camp">
          <option value="">Camp (optional)</option>
          <!-- Dynamic camp options will be loaded here from database -->
        </select>

        <button type="submit" class="primary-btn">🔔 Send Alert</button>
      </form>

      <section class="recent-alerts">
        <h2>Recent Alerts</h2>

        <div id="recentAlertsList">
          <!-- Dynamic recent alerts will be loaded here from database -->
        </div>
      </section>
    </section>
  </main>
</body>
</html>
