<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Disaster Relief Network</title>
    <style>
        .body-bg {
            background-color: #12141d;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }

        .main-container {
            width: 650px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .nav-section {
            border-bottom: 1px solid #2c2f3f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 12px;
        }

     
        .logo-img {
            height: 40px; 
            width: 40px;
            border-radius: 50%; 
            object-fit: cover;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .label-text {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .input-box {
            width: 100%;
            background-color: #1a1c26;
            border: 1px solid #2c2f3f;
            padding: 14px;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
        }

        .grid-table {
            width: 100%;
            border-spacing: 10px;
            margin-left: -10px;
        }

        .grid-cell {
            background-color: #1a1c26;
            border: 1px solid #2c2f3f;
            padding: 12px;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }

        .active-yellow {
            background-color: #977308;
            color: black;
            font-weight: bold;
            border: none;
        }

        .footer-flex {
            display: flex;
            gap: 20px;
            margin: 40px 0 60px;
        }

        .cancel-btn {
            flex: 1;
            background: transparent;
            border: 1px solid #2c2f3f;
            color: white;
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
        }

        .submit-btn {
            flex: 2;
            background-color: #f5c842;
            border: none;
            color: black;
            font-weight: bold;
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body class="body-bg">

    <header class="main-container">
        <div class="nav-section">
            <div class="logo-box">
                <img src="\web_project/Lifebuoy_logo.PNG" alt="Logo" class="logo-img">
                
                <div style="line-height: 1.1;">
                    <span style="font-weight: bold; font-size: 20px; color: #f5c842; display: block;">Disaster</span>
                    <span style="font-size: 11px; color: #888888; text-transform: uppercase;">relief network</span>
                </div>
            </div>
            <div>
                <a href="#" style="color: #888888; text-decoration: none; font-size: 14px; margin-left: 20px;">← Back to Dashboard</a>
                <a href="#" style="color: #888888; text-decoration: none; font-size: 14px; margin-left: 20px;">Sign Out</a>
            </div>
        </div>
    </header>

    <main class="main-container" style="margin-top: 40px;">
        
        <h2>⚠️ Submit New Request</h2>
        <p style="color: #888888; font-size: 14px; margin-bottom: 35px;">
            Fill out the form below to request relief assistance. Our team will verify and process your request within 24 hours.
        </p>

        <div class="form-group">
            <label class="label-text">Full Name *</label>
            <input type="text" class="input-box" placeholder="Enter your full name">
        </div>

        <div class="form-group">
            <label class="label-text">Current Location *</label>
            <input type="text" class="input-box" placeholder="e.g., Sylhet Division, Area name">
        </div>

        <div class="form-group">
            <label class="label-text">Number of Family Members *</label>
            <input type="number" class="input-box" placeholder="Number of people in your family">
        </div>

        <div class="form-group">
            <label class="label-text">Urgency Level *</label>
            <table class="grid-table">
                <tr>
                    <td class="grid-cell">Low</td>
                    <td class="grid-cell active-yellow">Medium</td>
                    <td class="grid-cell">High</td>
                </tr>
            </table>
        </div>

        <div class="form-group">
            <label class="label-text">Type of Need (Select all that apply) *</label>
            <table class="grid-table">
                <tr>
                    <td class="grid-cell">Food</td>
                    <td class="grid-cell">Water</td>
                    <td class="grid-cell">Shelter</td>
                </tr>
                <tr>
                    <td class="grid-cell">Medical</td>
                    <td class="grid-cell">Blankets</td>
                    <td class="grid-cell">Clothing</td>
                </tr>
            </table>
        </div>

        <div class="footer-flex">
            <button type="button" class="cancel-btn">Cancel</button>
            <button type="submit" class="submit-btn">Submit Request</button>
        </div>

    </main>

</body>
</html>
